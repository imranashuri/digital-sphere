<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Smart Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="dashboard-container">
        <header>
            <h2>Welcome, <span id="userName"></span>!</h2>
            <div>
                <button onclick="toggleTheme()">🌙 / ☀️</button>
                <button onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="stats">
            <div>Total Tasks: <span id="totalTasks">0</span></div>
            <div>Completed: <span id="completedTasks">0</span></div>
            <div>Pending: <span id="pendingTasks">0</span></div>
        </div>

        <div class="task-section">
            <input type="text" id="newTaskInput" placeholder="Add new task">
            <button onclick="addTask()">Add Task</button>

            <input type="text" id="searchInput" placeholder="Search tasks" onkeyup="searchTask()">

            <div class="filter-buttons">
                <button onclick="filterTasks('all')">All</button>
                <button onclick="filterTasks('completed')">Completed</button>
                <button onclick="filterTasks('pending')">Pending</button>
            </div>

            <ul id="taskList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
